<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="container mx-auto px-4 py-4 flex justify-between items-center">
    <div class="logo">
      <a routerLink="/menu" class="text-2xl font-bold text-amber-800">Cafe បង</a>
    </div>

    <!-- Desktop Navigation -->
    <div class="hidden md:flex items-center gap-6">
      <nav>
        <ul class="flex space-x-6 items-center">
          <li *ngIf="currentUser$ | async"><a routerLink="/menu" routerLinkActive="text-amber-600 font-semibold"
              [routerLinkActiveOptions]="{exact: true}" class="text-gray-600 hover:text-amber-800 transition">Home</a>
          </li>
          
          <li *ngIf="currentUser$ | async"><a routerLink="/menu" routerLinkActive="text-amber-600 font-semibold"
              class="text-gray-600 hover:text-amber-800 transition">Menu</a></li>

          <!-- <li><a routerLink="/contact" routerLinkActive="text-amber-600 font-semibold"
              class="text-gray-600 hover:text-amber-800 transition">Contact</a></li> -->

          <!-- Show when logged in as Admin -->
          <li *ngIf="showAdminLink()">
            <a routerLink="/admin" routerLinkActive="text-amber-600 font-semibold"
              class="text-gray-600 hover:text-amber-800 transition">Admin</a>
          </li>

          <!-- Show when NOT logged in -->
          <li *ngIf="!(currentUser$ | async)">
            <a routerLink="/login" routerLinkActive="text-amber-600 font-semibold"
              class="text-gray-600 hover:text-amber-800 transition">Login</a>
          </li>
        </ul>
      </nav>

      <!-- User Info & Logout (when logged in) -->
      <div *ngIf="currentUser$ | async as user" class="flex items-center gap-4">
        <span class="text-gray-700">Hi, <strong>{{ user.username }}</strong></span>
        <button (click)="logout()" class="text-gray-600 hover:text-red-600 transition font-semibold">
          Logout
        </button>
      </div>

      <!-- Desktop Cart Icon -->
      <a routerLink="/cart" class="relative text-gray-600 hover:text-amber-800 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <!-- Badge -->
        <span *ngIf="(cartCount$ | async)! > 0"
          class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">
          {{ cartCount$ | async }}
        </span>
      </a>
    </div>

    <!-- Mobile Navigation Controls -->
    <div class="md:hidden flex items-center gap-4">
      <!-- Mobile Cart Icon -->
      <a routerLink="/cart" class="relative text-gray-600 hover:text-amber-800 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <!-- Badge -->
        <span *ngIf="(cartCount$ | async)! > 0"
          class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-4 w-4 flex items-center justify-center">
          {{ cartCount$ | async }}
        </span>
      </a>

      <!-- Hamburger Menu Button -->
      <button (click)="openMobileMenu()" class="text-gray-600 hover:text-amber-800 transition focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="min-h-screen bg-amber-50">
  <router-outlet></router-outlet>
</main>
