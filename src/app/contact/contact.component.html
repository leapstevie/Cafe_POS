<div class="container mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold text-center mb-12 text-amber-900">Contact Us</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-6xl mx-auto">
    <!-- Contact Info -->
    <div>
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Get in Touch</h2>

      <div class="space-y-6">
        <div class="flex items-start space-x-4">
          <div class="bg-amber-100 p-3 rounded-full text-amber-600">
            📍
          </div>
          <div>
            <h3 class="font-bold text-gray-800">Address</h3>
            <p class="text-gray-600">123 Coffee Lane, Brew City, BC 90210</p>
          </div>
        </div>

        <div class="flex items-start space-x-4">
          <div class="bg-amber-100 p-3 rounded-full text-amber-600">
            📞
          </div>
          <div>
            <h3 class="font-bold text-gray-800">Phone</h3>
            <p class="text-gray-600">(555) 123-4567</p>
          </div>
        </div>

        <div class="flex items-start space-x-4">
          <div class="bg-amber-100 p-3 rounded-full text-amber-600">
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 11.944 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" />
            </svg>
          </div>
          <div>
            <h3 class="font-bold text-gray-800">Telegram</h3>
            <p class="text-gray-600">&#64;CafeAroma</p>
          </div>
        </div>

        <div class="flex items-start space-x-4">
          <div class="bg-amber-100 p-3 rounded-full text-amber-600">
            ⏰
          </div>
          <div>
            <h3 class="font-bold text-gray-800">Opening Hours</h3>
            <p class="text-gray-600">Mon - Fri: 7:00 AM - 8:00 PM</p>
            <p class="text-gray-600">Sat - Sun: 8:00 AM - 9:00 PM</p>
          </div>
        </div>
      </div>

      <!-- Map Placeholder -->
      <div class="mt-8 bg-gray-200 h-64 md:h-80 rounded-lg overflow-hidden flex items-center justify-center text-gray-500 w-full">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3632.9832907377513!2d104.89380865585296!3d11.569204677232747!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31095173761d4a53%3A0xcd09ff2f4d326e3f!2sSETEC%20Institute!5e0!3m2!1sen!2skh!4v1768056753113!5m2!1sen!2skh"
          class="w-full h-full" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="bg-white p-8 rounded-lg shadow-lg">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Send us a Message</h2>
      <form onsubmit="event.preventDefault(); alert('Message sent! (Demo)');">
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2" for="name">Name</label>
          <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-amber-500"
            type="text" id="name" required placeholder="Your Name">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2" for="email">Email</label>
          <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-amber-500"
            type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 font-bold mb-2" for="message">Message</label>
          <textarea
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-amber-500 h-32"
            id="message" required placeholder="How can we help you?"></textarea>
        </div>
        <button
          class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded transition duration-300"
          type="submit">
          Send Message
        </button>
      </form>
    </div>
  </div>
</div>
