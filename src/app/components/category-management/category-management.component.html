<div class="container mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <h1 class="text-2xl md:text-3xl font-bold text-amber-900">Category Management</h1>
        <div class="flex flex-wrap gap-2 md:gap-4">
            <a routerLink="/admin"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 md:px-6 rounded-lg transition text-sm md:text-base">Back to
                Items</a>
            <button (click)="showAddForm()"
                class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 md:px-6 rounded-lg transition text-sm md:text-base">+ Add New
                Category</button>
        </div>
    </div>

    <!-- Messages -->
    <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ errorMessage }}
    </div>

    <!-- Modal Form -->
    <div *ngIf="showForm" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ isEditing ? 'Edit Category' : 'Add New Category' }}
                </h2>
                <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Category Name *</label>
                            <input type="text" formControlName="name"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                                placeholder="e.g. Pastry">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Description</label>
                            <textarea formControlName="description" rows="3"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                                placeholder="Optional description"></textarea>
                        </div>
                    </div>
                    <div class="flex justify-end gap-4 mt-6">
                        <button type="button" (click)="cancelForm()"
                            class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition">Cancel</button>
                        <button type="submit" [disabled]="isLoading || categoryForm.invalid"
                            class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg transition disabled:opacity-50">
                            {{ isEditing ? 'Update' : 'Create' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden overflow-x-auto">
        <table class="w-full min-w-[600px]">
            <thead class="bg-gray-100 border-b">
                <tr>
                    <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Name</th>
                    <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Description</th>
                    <th class="px-6 py-3 text-center text-sm font-semibold text-gray-700">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let cat of categories" class="border-b hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-800">{{ cat.name }}</td>
                    <td class="px-6 py-4 text-gray-600">{{ cat.description }}</td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-3">
                            <button (click)="editCategory(cat)"
                                class="text-blue-600 hover:text-blue-800 font-medium">Edit</button>
                            <button (click)="deleteCategory(cat.id!, cat.name)"
                                class="text-red-600 hover:text-red-800 font-medium">Delete</button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="categories.length === 0">
                    <td colspan="3" class="px-6 py-10 text-center text-gray-500">No categories found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
