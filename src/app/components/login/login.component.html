<div class="min-h-screen bg-amber-50 flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-amber-900 mb-2">Cafe បង</h1>
            <p class="text-gray-600">Sign in to your account</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <!-- Error Message -->
                <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                    {{ errorMessage }}
                </div>

                <!-- Email Field -->
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-semibold mb-2">
                        Email Address
                    </label>
                    <input id="email" type="email" formControlName="email"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                        [class.border-red-500]="email?.invalid && email?.touched" placeholder="john@example.com">
                    <div *ngIf="email?.invalid && email?.touched" class="text-red-500 text-sm mt-1">
                        <p *ngIf="email?.errors?.['required']">Email is required</p>
                        <p *ngIf="email?.errors?.['email']">Please enter a valid email</p>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 font-semibold mb-2">
                        Password
                    </label>
                    <input id="password" type="password" formControlName="password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                        [class.border-red-500]="password?.invalid && password?.touched" placeholder="••••••••">
                    <div *ngIf="password?.invalid && password?.touched" class="text-red-500 text-sm mt-1">
                        <p *ngIf="password?.errors?.['required']">Password is required</p>
                        <p *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</p>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-lg transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span *ngIf="!isLoading">Sign In</span>
                    <span *ngIf="isLoading">Signing in...</span>
                </button>
            </form>

            <!-- Register Link -->
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Don't have an account?
                    <a routerLink="/register" class="text-amber-600 hover:text-amber-700 font-semibold">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
